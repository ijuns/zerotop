# Provider-neutral production contracts. The namespaced SecretStore is created
# only by a private deployment overlay and its workload identity is restricted
# to the remote paths listed here. Shared peer tokens resolve from one canonical
# remote value so rotation cannot leave either side of a trust link stale.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-api-secrets
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef: { kind: SecretStore, name: codegate-platform-secrets }
  target:
    name: codegate-api-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata: { labels: { app.kubernetes.io/name: codegate-api } }
  data:
    - { secretKey: DATABASE_URL, remoteRef: { key: codegate/production/api/postgres, property: url } }
    - { secretKey: REDIS_URL, remoteRef: { key: codegate/production/api/redis, property: url } }
    - { secretKey: KEYCLOAK_CLIENT_SECRET, remoteRef: { key: codegate/production/identity/keycloak, property: api-client-secret } }
    - { secretKey: RUNTIME_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/runtime, property: token } }
    - { secretKey: DESKTOP_GATEWAY_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/desktop, property: token } }
    - { secretKey: GRADER_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/grader, property: token } }
    - { secretKey: AI_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/ai, property: token } }
    - { secretKey: OPENVPN_DOWNLOAD_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/openvpn-download, property: token } }
    - { secretKey: VALIDATOR_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/validator, property: token } }
    - { secretKey: TELEMETRY_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/telemetry, property: token } }
    - { secretKey: BUILDER_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/builder, property: token } }
---
