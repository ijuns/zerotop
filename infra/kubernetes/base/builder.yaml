apiVersion: apps/v1
kind: Deployment
metadata:
  name: codegate-builder
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: codegate-builder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codegate-builder
    spec:
      serviceAccountName: codegate-builder
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10004
        runAsGroup: 10004
        fsGroup: 10004
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: builder
          image: ghcr.io/replace-me/codegate-builder:replace-with-digest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9004
          env:
            - name: PORT
              value: "9004"
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - name: BUILDER_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-builder-secrets
                  key: BUILDER_INTERNAL_TOKEN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: codegate-builder-secrets
                  key: DATABASE_URL
            - name: COSIGN_KEY_REF
              value: /etc/codegate-builder/signing/cosign.key
            - name: COSIGN_PUBLIC_KEY_PATH
              value: /etc/codegate-builder/signing/cosign.pub
            - name: COSIGN_PASSWORD_FILE
              value: /etc/codegate-builder/signing/password
            - name: DOCKER_CONFIG
              value: /home/builder/.docker
            - name: SSL_CERT_DIR
              value: /etc/ssl/certs
            - name: SSL_CERT_FILE
              value: /etc/codegate/registry-ca/ca.crt
            - name: COSIGN_REPOSITORY
              valueFrom:
                configMapKeyRef:
                  name: codegate-platform-config
                  key: COSIGN_REPOSITORY
          envFrom:
            - configMapRef:
                name: codegate-platform-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: temporary
              mountPath: /tmp
            - name: signing
              mountPath: /etc/codegate-builder/signing
              readOnly: true
            - name: registry-auth
              mountPath: /home/builder/.docker
              readOnly: true
            - name: registry-ca
              mountPath: /etc/codegate/registry-ca
              readOnly: true
      volumes:
        - name: temporary
          emptyDir: {}
        - name: signing
          secret:
            secretName: codegate-builder-signing
            defaultMode: 0440
        - name: registry-auth
          secret:
            secretName: codegate-build-registry
            items:
              - key: .dockerconfigjson
                path: config.json
            defaultMode: 0440
        - name: registry-ca
          secret:
            secretName: codegate-private-registry-ca
            items:
              - key: ca.crt
                path: ca.crt
            defaultMode: 0440
---
apiVersion: v1
kind: Service
metadata:
  name: codegate-builder
spec:
  selector:
    app.kubernetes.io/name: codegate-builder
  ports:
    - name: http
      port: 9004
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: codegate-builder
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: codegate-builder
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: codegate-builder-controller
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create", "patch", "delete"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges", "serviceaccounts", "configmaps", "secrets"]
    verbs: ["create", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "create", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: codegate-builder-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: codegate-builder-controller
subjects:
  - kind: ServiceAccount
    name: codegate-builder
    namespace: codegate-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codegate-builder-registry-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["codegate-build-registry", "codegate-private-registry-ca"]
    verbs: ["get"]
  # The admission binding uses this ConfigMap as its operator-owned parameter.
  # Kubernetes checks that the request identity can read the parameter before
  # evaluating the policy, so scope the grant to this exact object.
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["codegate-platform-config"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codegate-builder-registry-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: codegate-builder-registry-reader
subjects:
  - kind: ServiceAccount
    name: codegate-builder
---
# The controller needs cluster-scoped namespace privileges, but admission keeps
# every mutation inside its generated cg-build-* boundary even if compromised.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: codegate-builder-namespace-boundary
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["namespaces", "resourcequotas", "limitranges", "serviceaccounts", "configmaps", "secrets"]
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["jobs"]
      - apiGroups: ["networking.k8s.io"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["networkpolicies"]
  matchConditions:
    - name: builder-controller-only
      expression: request.userInfo.username == 'system:serviceaccount:codegate-platform:codegate-builder'
  validations:
    - expression: >-
        request.resource.resource == 'namespaces'
          ? (request.operation == 'DELETE'
              ? (oldObject.metadata.name.startsWith('cg-build-')
                && has(oldObject.metadata.labels)
                && oldObject.metadata.labels['app.kubernetes.io/name'] == 'codegate-builder'
                && 'codegate.ai/build-id' in oldObject.metadata.labels)
              : object.metadata.name.startsWith('cg-build-'))
          : request.namespace.startsWith('cg-build-')
      message: The Codegate builder may mutate only cg-build-* namespaces.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: codegate-builder-namespace-boundary
spec:
  policyName: codegate-builder-namespace-boundary
  validationActions: [Deny]
