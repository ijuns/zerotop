apiVersion: apps/v1
kind: Deployment
metadata:
  name: codegate-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: codegate-ai
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codegate-ai
    spec:
      serviceAccountName: codegate-ai
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ai
          image: ghcr.io/replace-me/codegate-ai:replace-with-digest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: AI_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-ai-secrets
                  key: AI_INTERNAL_TOKEN
            - name: GENERATION_PROVIDER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-ai-secrets
                  key: GENERATION_PROVIDER_TOKEN
            - name: REVIEW_PROVIDER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-ai-secrets
                  key: REVIEW_PROVIDER_TOKEN
            - name: RUBRIC_PROVIDER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-ai-secrets
                  key: RUBRIC_PROVIDER_TOKEN
            - name: NVD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codegate-ai-secrets
                  key: NVD_API_KEY
                  optional: true
          envFrom:
            - configMapRef:
                name: codegate-platform-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: temporary
              mountPath: /tmp
      volumes:
        - name: temporary
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: codegate-ai
spec:
  selector:
    app.kubernetes.io/name: codegate-ai
  ports:
    - name: http
      port: 8001
      targetPort: http
