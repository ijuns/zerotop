apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: builder-to-control-plane-and-postgres
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: codegate-builder
  policyTypes:
    - Egress
  egress:
    - to:
        # RKE2's first Service CIDR address. Keep this aligned with
        # rke2_service_cidr in the server inventory.
        - ipBlock:
            cidr: 10.43.0.1/32
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: codegate-data
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: validator-to-ai-and-runtime
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: codegate-validator
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: codegate-ai
      ports:
        - protocol: TCP
          port: 8001
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: codegate-runtime-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: codegate-runtime
      ports:
        - protocol: TCP
          port: 9000
---
# BuildKit jobs receive the same CIDR list from BUILD_EGRESS_CIDRS. This
# platform-namespace rule is separately required because the builder performs
# Cosign sign+verify and the validator performs Cosign/crane/Syft/Trivy reads
# after the build Job exits. A production overlay must replace this
# documentation CIDR with the private registry's stable routed CIDR(s).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: builder-and-validator-to-private-registry
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - codegate-builder
          - codegate-validator
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 192.0.2.10/32
      ports:
        - protocol: TCP
          port: 443
---
