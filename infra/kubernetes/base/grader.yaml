apiVersion: apps/v1
kind: Deployment
metadata:
  name: codegate-grader
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: codegate-grader
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codegate-grader
    spec:
      serviceAccountName: codegate-grader
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grader
          # Build from the repository root with services/grader/Dockerfile. An
          # overlay must replace this placeholder with a signed image digest.
          image: ghcr.io/replace-me/codegate-grader:replace-with-digest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9002
          env:
            - name: PORT
              value: "9002"
            - name: ELASTICSEARCH_URL
              valueFrom:
                configMapKeyRef:
                  name: codegate-platform-config
                  key: ELASTICSEARCH_URL
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: codegate-platform-config
                  key: AI_SERVICE_URL
            - name: GRADER_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-grader-secrets
                  key: GRADER_INTERNAL_TOKEN
            - name: ELASTICSEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codegate-grader-secrets
                  key: ELASTICSEARCH_API_KEY
            - name: AI_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-grader-secrets
                  key: AI_INTERNAL_TOKEN
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: temporary
              mountPath: /tmp
      volumes:
        - name: temporary
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: codegate-grader
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: codegate-grader
  ports:
    - name: http
      port: 9002
      targetPort: http
