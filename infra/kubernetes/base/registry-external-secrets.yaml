# These manifests are provider-neutral. A private overlay must create the
# namespaced `codegate-platform-secrets` SecretStore with an identity restricted
# to the listed remote paths. Secret material is never committed to this base.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-build-registry
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef:
    kind: SecretStore
    name: codegate-platform-secrets
  target:
    name: codegate-build-registry
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      metadata:
        labels:
          app.kubernetes.io/name: codegate-builder
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: codegate/production/builder/registry-push
        property: dockerconfigjson
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-validator-registry
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef:
    kind: SecretStore
    name: codegate-platform-secrets
  target:
    name: codegate-validator-registry
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      metadata:
        labels:
          app.kubernetes.io/name: codegate-validator
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: codegate/production/validator/registry-pull
        property: dockerconfigjson
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-private-registry-ca
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef:
    kind: SecretStore
    name: codegate-platform-secrets
  target:
    name: codegate-private-registry-ca
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: codegate-private-registry
  data:
    - secretKey: ca.crt
      remoteRef:
        key: codegate/production/private-registry
        property: ca.crt
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-builder-signing
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef:
    kind: SecretStore
    name: codegate-platform-secrets
  target:
    name: codegate-builder-signing
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: codegate-builder
  data:
    - secretKey: cosign.key
      remoteRef:
        key: codegate/production/builder/cosign
        property: cosign.key
    - secretKey: cosign.pub
      remoteRef:
        key: codegate/production/builder/cosign
        property: cosign.pub
    - secretKey: password
      remoteRef:
        key: codegate/production/builder/cosign
        property: password
