# The private overlay supplies the namespaced codegate-platform-secrets
# SecretStore. The internal peer token remains on its canonical shared path so
# rotation stays atomic across the AI service-to-gateway trust link.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-model-gateway-secrets
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef:
    kind: SecretStore
    name: codegate-platform-secrets
  target:
    name: codegate-model-gateway-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: model-gateway
  data:
    - secretKey: MODEL_GATEWAY_INTERNAL_TOKEN
      remoteRef:
        key: codegate/production/internal/model-gateway
        property: token
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: codegate/production/model-gateway/anthropic
        property: api-key
