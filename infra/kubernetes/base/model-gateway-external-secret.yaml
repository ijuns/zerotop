# The private overlay supplies the namespaced codegate-platform-secrets
# SecretStore. The peer token path is shared with the three AI provider-token
# keys so rotation remains atomic across the trust link.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-model-gateway-secrets
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef:
    kind: SecretStore
    name: codegate-platform-secrets
  target:
    name: codegate-model-gateway-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: model-gateway
  data:
    - secretKey: MODEL_GATEWAY_INTERNAL_TOKEN
      remoteRef:
        key: codegate/production/internal/model-gateway
        property: token
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: codegate/production/model-gateway/openai
        property: api-key
