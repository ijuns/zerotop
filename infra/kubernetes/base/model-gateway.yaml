apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-gateway
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: model-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-gateway
    spec:
      serviceAccountName: model-gateway
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: model-gateway
          image: ghcr.io/replace-me/codegate-model-gateway:replace-with-digest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9010
          env:
            - name: PORT
              value: "9010"
            - name: MODEL_GATEWAY_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-model-gateway-secrets
                  key: MODEL_GATEWAY_INTERNAL_TOKEN
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codegate-model-gateway-secrets
                  key: OPENAI_API_KEY
          envFrom:
            - configMapRef:
                name: codegate-platform-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: temporary
              mountPath: /tmp
      volumes:
        - name: temporary
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: model-gateway
spec:
  selector:
    app.kubernetes.io/name: model-gateway
  ports:
    - name: http
      port: 9010
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: model-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: model-gateway
