apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: codegate-platform
resources:
  - ../../base
patches:
  - path: provider-config.yaml
  - target:
      group: external-secrets.io
      version: v1
      kind: ExternalSecret
      name: codegate-model-gateway-secrets
    path: provider-secret.yaml
  - target:
      group: cilium.io
      version: v2
      kind: CiliumNetworkPolicy
      name: model-gateway-provider-egress
    patch: |-
      - op: replace
        path: /spec/egress/0/toPorts/0/rules/dns/0/matchName
        value: api.anthropic.com
      - op: replace
        path: /spec/egress/1/toFQDNs/0/matchName
        value: api.anthropic.com
