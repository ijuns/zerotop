apiVersion: v1
kind: ServiceAccount
metadata:
  name: codegate-desktop-gateway
  namespace: codegate-desktop-system
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codegate-desktop-gateway
  namespace: codegate-desktop-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: codegate-desktop-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codegate-desktop-gateway
    spec:
      serviceAccountName: codegate-desktop-gateway
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          # An overlay must replace this contract placeholder with a signed digest.
          image: ghcr.io/replace-me/codegate-desktop-gateway:replace-with-digest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PLATFORM_API_URL
              value: http://codegate-api.codegate-platform.svc.cluster.local:8080
            - name: DESKTOP_UPSTREAM_PORT
              value: "6080"
            - name: DESKTOP_GATEWAY_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-desktop-secrets
                  key: DESKTOP_GATEWAY_INTERNAL_TOKEN
            - name: DESKTOP_SESSION_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: codegate-desktop-secrets
                  key: DESKTOP_SESSION_SIGNING_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: temporary
              mountPath: /tmp
      volumes:
        - name: temporary
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: codegate-desktop-gateway
  namespace: codegate-desktop-system
spec:
  # Public traffic reaches this ClusterIP only through the authenticated TLS
  # Ingress below. Never replace it with a NodePort or LoadBalancer service.
  type: ClusterIP
  selector:
    app.kubernetes.io/name: codegate-desktop-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codegate-desktop-gateway
  namespace: codegate-desktop-system
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - desktop.example.invalid
      secretName: codegate-desktop-tls
  rules:
    - host: desktop.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: codegate-desktop-gateway
                port:
                  name: http
