  name: codegate-runtime-workload-shape
spec:
  policyName: codegate-runtime-workload-shape
  paramRef:
    name: codegate-runtime-config
    namespace: codegate-runtime-system
    parameterNotFoundAction: Deny
  validationActions: [Deny]
