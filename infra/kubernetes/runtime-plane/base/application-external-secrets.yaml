# Runtime identities use separate namespaced SecretStores. A private overlay
# must create each store with access only to the remote paths referenced by the
# ExternalSecrets in its namespace; learner namespaces never receive a store.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-runtime-secrets
  namespace: codegate-runtime-system
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef: { kind: SecretStore, name: codegate-runtime-secret-store }
  target:
    name: codegate-runtime-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata: { labels: { app.kubernetes.io/name: codegate-runtime } }
  data:
    - { secretKey: RUNTIME_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/runtime, property: token } }
    - { secretKey: OPENVPN_ISSUER_TOKEN, remoteRef: { key: codegate/production/internal/openvpn-issuer, property: token } }
    - { secretKey: SANDBOX_RUNNER_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/sandbox-runner, property: token } }
    - { secretKey: ELASTICSEARCH_API_KEY, remoteRef: { key: codegate/production/runtime/elasticsearch, property: api-key } }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-desktop-secrets
  namespace: codegate-desktop-system
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef: { kind: SecretStore, name: codegate-desktop-secret-store }
  target:
    name: codegate-desktop-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata: { labels: { app.kubernetes.io/name: codegate-desktop-gateway } }
  data:
    - { secretKey: DESKTOP_GATEWAY_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/desktop, property: token } }
    - { secretKey: DESKTOP_SESSION_SIGNING_KEY, remoteRef: { key: codegate/production/desktop/session-signing, property: key } }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-openvpn-secrets
  namespace: codegate-vpn-system
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef: { kind: SecretStore, name: codegate-vpn-secret-store }
  target:
    name: codegate-openvpn-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata: { labels: { app.kubernetes.io/name: codegate-openvpn-issuer } }
  data:
    - { secretKey: DATABASE_URL, remoteRef: { key: codegate/production/openvpn/postgres, property: url } }
    - { secretKey: OPENVPN_ISSUER_TOKEN, remoteRef: { key: codegate/production/internal/openvpn-issuer, property: token } }
    - { secretKey: OPENVPN_DOWNLOAD_INTERNAL_TOKEN, remoteRef: { key: codegate/production/internal/openvpn-download, property: token } }
    - { secretKey: OPENVPN_MASTER_KEY, remoteRef: { key: codegate/production/openvpn/encryption, property: master-key } }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codegate-openvpn-pki
  namespace: codegate-vpn-system
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef: { kind: SecretStore, name: codegate-vpn-secret-store }
  target:
    name: codegate-openvpn-pki
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata: { labels: { app.kubernetes.io/name: codegate-openvpn-issuer } }
  data:
    - { secretKey: ca.crt, remoteRef: { key: codegate/production/openvpn/pki, property: ca.crt } }
    - { secretKey: ca.key, remoteRef: { key: codegate/production/openvpn/pki, property: ca.key } }
    - { secretKey: tls-crypt.key, remoteRef: { key: codegate/production/openvpn/pki, property: tls-crypt.key } }
