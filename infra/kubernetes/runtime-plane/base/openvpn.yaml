apiVersion: v1
kind: ConfigMap
metadata:
  name: codegate-openvpn-config
  namespace: codegate-vpn-system
data:
  PLATFORM_API_URL: http://codegate-api.codegate-platform.svc.cluster.local:8080
  OPENVPN_ALLOWED_CIDR: 10.42.0.0/16
  OPENVPN_CA_CERT_PATH: /etc/openvpn/pki/ca.crt
  OPENVPN_CA_KEY_PATH: /etc/openvpn/pki/ca.key
  OPENVPN_TLS_CRYPT_PATH: /etc/openvpn/pki/tls-crypt.key
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: codegate-openvpn-issuer
  namespace: codegate-vpn-system
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codegate-openvpn-issuer
  namespace: codegate-vpn-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: codegate-openvpn-issuer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codegate-openvpn-issuer
    spec:
      serviceAccountName: codegate-openvpn-issuer
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: issuer
          image: ghcr.io/replace-me/codegate-openvpn-issuer:replace-with-digest
          imagePullPolicy: IfNotPresent
          ports:
            - name: issuer
              containerPort: 9100
              protocol: TCP
          env:
            - name: PORT
              value: "9100"
            - name: OPENVPN_PROFILE_TTL_MAX_MINUTES
              value: "240"
            - name: PLATFORM_API_URL
              valueFrom:
                configMapKeyRef:
                  name: codegate-openvpn-config
                  key: PLATFORM_API_URL
            - name: OPENVPN_ALLOWED_CIDR
              valueFrom:
                configMapKeyRef:
                  name: codegate-openvpn-config
                  key: OPENVPN_ALLOWED_CIDR
            - name: OPENVPN_CA_CERT_PATH
              valueFrom:
                configMapKeyRef:
                  name: codegate-openvpn-config
                  key: OPENVPN_CA_CERT_PATH
            - name: OPENVPN_CA_KEY_PATH
              valueFrom:
                configMapKeyRef:
                  name: codegate-openvpn-config
                  key: OPENVPN_CA_KEY_PATH
            - name: OPENVPN_TLS_CRYPT_PATH
              valueFrom:
                configMapKeyRef:
                  name: codegate-openvpn-config
                  key: OPENVPN_TLS_CRYPT_PATH
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: codegate-openvpn-secrets
                  key: DATABASE_URL
            - name: OPENVPN_ISSUER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-openvpn-secrets
                  key: OPENVPN_ISSUER_TOKEN
            - name: OPENVPN_DOWNLOAD_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codegate-openvpn-secrets
                  key: OPENVPN_DOWNLOAD_INTERNAL_TOKEN
            - name: OPENVPN_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: codegate-openvpn-secrets
                  key: OPENVPN_MASTER_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: issuer
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: issuer
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: pki
              mountPath: /etc/openvpn/pki
              readOnly: true
            - name: runtime
              mountPath: /run/openvpn
      volumes:
        - name: pki
          secret:
            secretName: codegate-openvpn-pki
            defaultMode: 0440
        - name: runtime
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: openvpn-issuer
  namespace: codegate-vpn-system
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: codegate-openvpn-issuer
  ports:
    - name: issuer
      port: 9100
      targetPort: issuer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codegate-openvpn-download
  namespace: codegate-vpn-system
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - vpn.example.invalid
      secretName: codegate-openvpn-download-tls
  rules:
    - host: vpn.example.invalid
      http:
        paths:
          - path: /download
            pathType: Prefix
            backend:
              service:
                name: openvpn-issuer
                port:
                  name: issuer
