apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: codegate-vpn-system
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openvpn-issuer-ingress
  namespace: codegate-vpn-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: codegate-openvpn-issuer
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: codegate-runtime-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: codegate-runtime
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/managed-by: codegate-runtime
          podSelector:
            matchLabels:
              codegate.ai/role: vpn-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 9100
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openvpn-issuer-dns
  namespace: codegate-vpn-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: codegate-openvpn-issuer
  policyTypes: ["Egress"]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: codegate-platform
          podSelector:
            matchLabels:
              app.kubernetes.io/name: codegate-api
      ports:
        - { protocol: TCP, port: 8080 }
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: codegate-data
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - { protocol: TCP, port: 5432 }
