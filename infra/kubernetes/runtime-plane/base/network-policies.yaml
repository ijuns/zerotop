apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: desktop-to-platform-api-and-labs
  namespace: codegate-desktop-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: codegate-desktop-gateway
