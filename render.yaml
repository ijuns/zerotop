# Render Blueprint — free single-domain demo deployment of ZeroTOP.
#
# Two services: the Node API and the Next.js web. The web proxies /api/* to the
# API (API_PROXY_TARGET), so the browser only ever talks to the web origin and
# no CORS is involved. Data lives in an ephemeral SQLite file and is reseeded on
# every boot (DEMO_SEED), so the ranking is always populated; accounts created
# by visitors do not survive a restart, which is acceptable for a demo.
#
# This runs AUTH_MODE=local: real password login without Keycloak. It is a demo
# posture, not production authentication.
#
# After the first deploy, set the two secrets marked `sync: false` in the Render
# dashboard:
#   - SEED_FIXTURE_PASSWORD (on zerotop-api): the login password for every seed
#     account, including the admin admin@zerotop.local. Choose your own so the
#     value in the public repo is not the live credential.

services:
  - type: web
    name: zerotop-api
    runtime: docker
    dockerfilePath: ./infra/docker/api.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_MODE
        value: local
      - key: REPOSITORY_MODE
        value: sqlite
      - key: RUNTIME_ADAPTER
        value: simulator
      - key: AI_ADAPTER
        value: local
      - key: ENVIRONMENT_BUILDER_ADAPTER
        value: development
      - key: LAB_VALIDATOR_ADAPTER
        value: development
      - key: GRADER_ADAPTER
        value: mock
      - key: TELEMETRY_ADAPTER
        value: development
      - key: DEMO_SEED
        value: "true"
      # Render injects service references at container runtime, after the
      # Next.js image has already been built. The browser therefore connects
      # to the API's public endpoint directly and this origin must be allowed.
      - key: ALLOWED_ORIGINS
        value: https://zerotop-web.onrender.com,https://zerotop.onrender.com
      - key: SESSION_SIGNING_SECRET
        generateValue: true
      # Set this in the dashboard; it is the login password for the seed
      # accounts including admin@zerotop.local.
      - key: SEED_FIXTURE_PASSWORD
        sync: false

  - type: web
    name: zerotop-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: CODEGATE_WEB_AUTH_MODE
        value: local
      - key: CODEGATE_WEB_DEVELOPMENT_IDENTITY
        value: "false"
      # Runtime-public API endpoint used by the browser. This avoids relying on
      # a Next.js rewrite that would need API_PROXY_TARGET at image build time.
      - key: CODEGATE_WEB_API_URL
        value: https://zerotop-api.onrender.com

  # Canonical public web service. Keep zerotop-web during the cutover so the
  # existing demo remains available until this service has deployed cleanly.
  - type: web
    name: zerotop
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: CODEGATE_WEB_AUTH_MODE
        value: local
      - key: CODEGATE_WEB_DEVELOPMENT_IDENTITY
        value: "false"
      - key: CODEGATE_WEB_API_URL
        value: https://zerotop-api.onrender.com
