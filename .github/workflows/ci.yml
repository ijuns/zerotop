name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/ai/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r services/ai/requirements.txt PyYAML==6.0.2

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check workspaces
        run: pnpm check

      - name: Run Node and AI Python tests
        run: pnpm test

      - name: Build production artifacts
        run: pnpm build

      - name: Parse repository YAML
        shell: python
        run: |
          from pathlib import Path
          import yaml

          ignored = {"node_modules", ".pnpm", ".git"}
          paths = sorted(
              path
              for pattern in ("*.yml", "*.yaml")
              for path in Path(".").rglob(pattern)
              if not ignored.intersection(path.parts)
          )
          if not paths:
              raise SystemExit("No YAML files found")
          for path in paths:
              with path.open("r", encoding="utf-8") as stream:
                  list(yaml.safe_load_all(stream))
          print(f"Parsed {len(paths)} YAML files")

      - name: Validate infrastructure security contracts
        run: python scripts/validate-infra-contracts.py
